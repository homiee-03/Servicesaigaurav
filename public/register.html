<!doctype html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Registration</title><script src='https://cdn.tailwindcss.com'></script><link rel='stylesheet' href='/styles.css'></head><body><main class='max-w-xl mx-auto px-4 py-8'><a href='javascript:history.back()' class='text-slate-400'>← Back</a><section class='card p-6 mt-4'><h1 class='text-3xl font-bold mb-4'>Registration Form</h1><form id='regForm' class='space-y-3'>
<input class='w-full rounded-lg bg-white/10 border border-white/20 p-3' name='name' placeholder='Full Name' required>
<input class='w-full rounded-lg bg-white/10 border border-white/20 p-3' name='phone' placeholder='Mobile Number' required>
<input class='w-full rounded-lg bg-white/10 border border-white/20 p-3' type='email' name='email' placeholder='Email' required>
<textarea class='w-full rounded-lg bg-white/10 border border-white/20 p-3' name='address' placeholder='Address' required></textarea>
<input class='w-full rounded-lg bg-white/10 border border-white/20 p-3' name='note' placeholder='Any additional details'>
<input id='plan' class='w-full rounded-lg bg-white/10 border border-white/20 p-3' name='plan' readonly>
<input id='amount' class='w-full rounded-lg bg-white/10 border border-white/20 p-3' name='amount' readonly>
<button class='btn-purple w-full rounded-xl py-3 text-xl font-bold'>Continue to Payment</button>
</form></section></main><script>
const q=new URLSearchParams(location.search);document.getElementById('plan').value=q.get('plan')||'';document.getElementById('amount').value=q.get('amount')?`₹${Number(q.get('amount')).toLocaleString('en-IN')}`:'';
document.getElementById('regForm').addEventListener('submit',async(e)=>{e.preventDefault();const payload=Object.fromEntries(new FormData(e.target).entries());const r=await fetch('/api/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});const d=await r.json();if(!r.ok){alert(d.error||'Failed');return;}location.href=`/payment.html?id=${d.id}`;});
</script></body></html>
