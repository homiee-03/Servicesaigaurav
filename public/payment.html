<!doctype html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Payment</title><script src='https://cdn.tailwindcss.com'></script><link rel='stylesheet' href='/styles.css'></head><body><main class='max-w-xl mx-auto px-4 py-8'><section class='card p-6'><h1 class='text-3xl font-bold'>Payment Page</h1><p class='text-slate-300 mt-2'>Please scan the QR code and complete the payment. After payment, upload the screenshot.</p><img id='qr' class='mx-auto mt-6 w-72 h-72 bg-white rounded-xl p-2' alt='QR Code'><form id='uploadForm' class='space-y-3 mt-6'><label class='block'>Payment Screenshot (jpg/jpeg/png/pdf)</label><input type='file' name='screenshot' accept='.jpg,.jpeg,.png,.pdf' required class='block w-full'><button class='btn-purple w-full rounded-xl py-3 text-xl font-bold'>Submit Screenshot</button></form></section></main><script>
let cfg={qrImagePath:'/assets/qr-placeholder.svg'};fetch('/api/config').then(r=>r.json()).then(c=>{cfg=c;document.getElementById('qr').src=c.qrImagePath;}).catch(()=>{document.getElementById('qr').src=cfg.qrImagePath;});
const id=new URLSearchParams(location.search).get('id');
document.getElementById('uploadForm').addEventListener('submit',async(e)=>{e.preventDefault();if(!id){alert('Missing registration id');return;}const fd=new FormData(e.target);const r=await fetch(`/api/upload/${id}`,{method:'POST',body:fd});const d=await r.json();if(!r.ok){alert(d.error||'Upload failed');return;}window.open(d.whatsappLink,'_blank');location.href=`/success.html?whatsapp=${encodeURIComponent(d.whatsappLink)}`;});
</script></body></html>
